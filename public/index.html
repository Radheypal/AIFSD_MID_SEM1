<!DOCTYPE html>
<html>

<head>

<title>Store Inventory Management</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Store Inventory Management</h1>

<!-- Add Product -->

<div class="card">

<h2>Add Product</h2>

<input id="productName" placeholder="Product Name">

<input id="productCode" placeholder="Product Code">

<input id="category" placeholder="Category">

<input id="supplierName" placeholder="Supplier Name">

<input id="quantityInStock" placeholder="Quantity">

<input id="unitPrice" placeholder="Price">

<button onclick="addProduct()">Add Product</button>

</div>

<!-- Search and Filter -->

<div class="card">

<h2>Search / Filter</h2>

<input id="searchName" placeholder="Search by product name">

<button onclick="searchProduct()">Search</button>

<input id="filterCategory" placeholder="Filter by category">

<button onclick="filterCategory()">Filter</button>

</div>

<!-- Product Table -->

<div class="card">

<h2>Products</h2>

<button onclick="getProducts()">Load Products</button>

<table>

<thead>

<tr>

<th>Name</th>
<th>Category</th>
<th>Quantity</th>
<th>Price</th>
<th>Action</th>

</tr>

</thead>

<tbody id="productTable"></tbody>

</table>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
